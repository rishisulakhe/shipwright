services:
  db:
    image: postgres:16-alpine
    container_name: dd-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ddpass}
      POSTGRES_DB: ${POSTGRES_DB:-dockerdash}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dduser} -d ${POSTGRES_DB:-dockerdash}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dd-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dd-prod-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dduser}:${POSTGRES_PASSWORD:-ddpass}@db:5432/${POSTGRES_DB:-dockerdash}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: dd-prod-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  pgdata:

networks:
  dd-network:
    driver: bridge